<body>
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div style="text-align:center;color:var(--text-muted);font-size:0.9rem;animation:fadeUp 0.4s ease">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="var(--accent)"
        style="margin-bottom:1rem;display:block;margin-left:auto;margin-right:auto">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" />
      </svg>
      Checking session…
    </div>
  </div>

  <script type="module">
    import { supabaseClient } from './js/supabase-client.js';

    // onAuthStateChange fires immediately when the Supabase client
    // detects a valid session OR parses an email-verification token
    // from the URL hash (#access_token=...&type=signup).
    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange(
      (event, session) => {
        if (session) {
          // Covers: existing session, email confirmed, magic-link, OAuth, etc.
          subscription.unsubscribe();
          window.location.replace('./dashboard.html');
        }
      }
    );

    // Fallback: if no auth event fires within 3 seconds, go to login.
    setTimeout(() => {
      subscription.unsubscribe();
      window.location.replace('./login.html');
    }, 3000);
  </script>
</body>

</html>
